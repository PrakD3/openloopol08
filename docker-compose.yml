

services:
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - INFERENCE_MODE=${INFERENCE_MODE:-online}
      - APP_MODE=${APP_MODE:-demo}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEEPSAFE_URL=http://deepsafe:8001
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-vigilens}
      - LANGSMITH_TRACING_V2=${LANGSMITH_TRACING_V2:-false}
    env_file:
      - ./backend/.env
    depends_on:
      - ollama
      - deepsafe
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_INFERENCE_MODE=${INFERENCE_MODE:-online}
      - NEXT_PUBLIC_APP_MODE=${APP_MODE:-demo}
      - NEXT_PUBLIC_BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  deepsafe:
    build:
      context: ./backend/docker
      dockerfile: Dockerfile.deepsafe
    ports:
      - "8001:8001"
    restart: unless-stopped

volumes:
  ollama_data:
