services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  deepsafe:
    build:
      context: ./backend/docker
      dockerfile: Dockerfile.deepsafe
    ports:
      - "8001:8001"
    restart: unless-stopped

volumes:
  ollama_data:
