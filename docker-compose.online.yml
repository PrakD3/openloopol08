version: '3.9'

# Online-mode stack — no local AI models required
# Uses Groq API for LLM, Hive AI for deepfake detection, OpenAI Whisper API

services:
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - INFERENCE_MODE=online
      - APP_MODE=${APP_MODE:-demo}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HIVE_API_KEY=${HIVE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY}
      - TINEYE_API_KEY=${TINEYE_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-vigilens}
      - LANGSMITH_TRACING_V2=true
      - WHISPER_USE_API=true
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_INFERENCE_MODE=online
        - NEXT_PUBLIC_APP_MODE=${APP_MODE:-demo}
        - NEXT_PUBLIC_BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_INFERENCE_MODE=online
      - NEXT_PUBLIC_APP_MODE=${APP_MODE:-demo}
      - NEXT_PUBLIC_BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
